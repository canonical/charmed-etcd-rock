name: Publish to GHCR

on:
  push:
    branches:
      - 3.6-24.04/stable

jobs:
  ci-tests:
    uses: ./.github/workflows/ci.yaml
  publish:
    needs: ci-tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Extract branch name
        shell: bash
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          echo "branch=${BRANCH}" >> $GITHUB_OUTPUT
          echo "risk=${BRANCH##*\/}" >> $GITHUB_OUTPUT
        id: extract_branch
      - name: Setup Docker
        run: |
          sudo snap install docker
          sudo addgroup --system docker; sudo adduser $USER docker
          newgrp docker
          sudo snap disable docker; sudo snap enable docker
      - name: Install rockcraft
        run: |
          sudo snap install rockcraft --classic
      - name: Install yq
        run: |
          sudo snap install yq
      - uses: actions/download-artifact@v4
        with:
          name: charmed-etcd-rock
          path: .
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Import and push to GHCR
        run: |
          version="$(yq .version rockcraft.yaml)"
          base=$(yq .base rockcraft.yaml)
          base="${base#*@}"
          risk=${{ steps.extract_branch.outputs.risk }}
          tag=${version}-${base}_${risk}

          echo "Publishing charmed-etcd:${tag}"
          sudo rockcraft.skopeo --insecure-policy copy \
            oci-archive:charmed-etcd_${version}_amd64.rock \
            docker-daemon:ghcr.io/canonical/charmed-etcd:${tag}
          docker push ghcr.io/canonical/charmed-etcd:${tag}
